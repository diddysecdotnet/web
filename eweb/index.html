<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Hub</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email"/>
  <input id="password" type="password" placeholder="Password"/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <header class="card">
    <h1>Social Hub</h1>
    <p id="status"></p>
  </header>

  <!-- PROFILE -->
  <section class="card">
    <h2>Your Profile</h2>

    <input id="name" placeholder="Name"/>
    <input id="tag" placeholder="Tag (FPS Player)"/>
    <textarea id="bio" placeholder="Bio"></textarea>

    <h3>Socials</h3>
    <input id="discord" placeholder="Discord"/>
    <input id="instagram" placeholder="Instagram URL"/>
    <input id="tiktok" placeholder="TikTok URL"/>
    <input id="github" placeholder="GitHub URL"/>

    <h3>Spotify</h3>
    <input id="spotify" placeholder="Spotify link"/>

    <button onclick="saveProfile()">Save Profile</button>

    <div id="profileDisplay"></div>
  </section>

  <!-- POST -->
  <section class="card">
    <h2>Post</h2>
    <textarea id="postText" placeholder="What's happening?"></textarea>
    <button onclick="createPost()">Post</button>
  </section>

  <!-- FEED -->
  <section class="card">
    <h2>Feed</h2>
    <div id="feed"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
